<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNSAAC · Horarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <div>
          <div class="brand-name">UNSAAC</div>
          <div class="brand-sub">Sistema de Horarios</div>
        </div>
      </div>
      <div class="header-badge" id="semestre-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="semestre-text">Cargando...</span>
      </div>
    </div>
  </header>

  <main>

    <!-- SEARCH CARD -->
    <section class="search-section">
      <div class="search-card">
        <div class="search-card-left">
          <h1 class="search-title">Consulta tu<br><span class="highlight">horario</span></h1>
          <p class="search-desc">Ingresa tu código para ver los cursos matriculados y tu horario semanal.</p>
        </div>
        <div class="search-card-right">
          <div class="field-group">
            <div class="field">
              <label>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Código de Alumno
              </label>
              <input type="text" id="codigo" placeholder="Ej. 222222" maxlength="10"/>
            </div>
            <div class="field">
              <label>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Semestre <span class="opt-label">opcional</span>
              </label>
              <input type="text" id="semestre" placeholder="Ej. 2026-1"/>
            </div>
            <div class="field">
              <label>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Carrera
              </label>
              <div class="select-wrap"><select id="carrera"><option value="">Cargando...</option></select></div>
            </div>
            
          </div>
          <button id="btn-buscar" onclick="buscar()">
            <span>Buscar cursos</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
          <div id="error-msg" class="error-msg hidden"></div>
        </div>
      </div>
    </section>

    <!-- LOADER -->
    <div id="loader" class="hidden">
      <div class="loader-ring"></div>
      <p>Buscando en <strong id="loader-count">0</strong> cursos...</p>
    </div>

    <!-- RESULTADOS -->
    <section id="resultados" class="hidden">

      <!-- ALUMNO HERO -->
      <div class="alumno-hero">
        <div class="alumno-avatar" id="alumno-avatar"></div>
        <div class="alumno-info">
          <div class="alumno-nombre" id="alumno-nombre"></div>
          <div class="alumno-chips">
            <span class="chip chip-blue" id="chip-codigo"></span>
            <span class="chip chip-purple" id="chip-semestre"></span>
            <span class="chip chip-green" id="chip-ncursos"></span>
          </div>
        </div>
      </div>

      <!-- CRUCE ALERT -->
      <div id="cruce-alert" class="cruce-alert hidden">
        <div class="cruce-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div id="cruce-text"></div>
      </div>

      <!-- HORARIO -->
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Horario Semanal
        </div>
      </div>
      <div class="horario-card">
        <div class="horario-scroll">
          <table class="horario-table" id="horario-table">
            <thead>
              <tr>
                <th class="hora-th">Hora</th>
                <th>Lunes</th><th>Martes</th><th>Miércoles</th>
                <th>Jueves</th><th>Viernes</th><th>Sábado</th>
              </tr>
            </thead>
            <tbody id="horario-body"></tbody>
          </table>
        </div>
      </div>

      <!-- CURSOS -->
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Cursos Matriculados
        </div>
      </div>
      <div class="cursos-grid" id="cursos-grid"></div>

    </section>
  </main>

  <footer>
    <span>UNSAAC · Centro de Cómputo</span>
    <span id="footer-sem"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
